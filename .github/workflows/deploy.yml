name: Deploy taskademia

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Documents/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build frontend
        env:
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          rm -f package-lock.json

          npm install
          cd frontend
          npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend to server
        run: |
          rsync -avz --delete frontend/dist/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ vars.SERVER_PATH }}/frontend/dist/

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            set -e

            cd "${{ vars.SERVER_PATH }}"
            
            git fetch origin main
            git reset --hard origin/main

            npm install

            cd ./backend
            npm install
            pm2 restart taskademia-backend || pm2 start server.mjs --name taskademia-backend
            pm2 save
          EOF
