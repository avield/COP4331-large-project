name: Deploy taskademia

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Documents/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            set -e

            cd "${{ vars.SERVER_PATH }}"
            git pull origin main

            cd frontend
            npm install
            npm run build

            cd ../backend
            npm install
            pm2 restart taskademia-backend || pm2 start server.mjs --name taskademia-backend
            pm2 save
          EOF
